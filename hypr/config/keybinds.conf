
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

bindd = $mainMod, T, Opens browser, exec, $browser
bindd = $mainMod, R, Opens your preferred terminal emulator ($terminal), exec, $terminal
bindd = $mainMod, E, Opens your preferred filemanager ($filemanager), exec, $filemanager
bindd = $mainMod, A, Screen capture selection, exec, $ipc plugin:screen-toolkit annotate
bindd = $mainMod SHIFT, A, Screen capture selection, exec, $ipc plugin:screen-toolkit annotateWindow
bindd = $mainMod CTRL, A, Screen capture selection, exec, $ipc plugin:screen-toolkit annotateFullscreen
bindd = $mainMod, Q, Closes (not kill) current window, killactive
#bind = $mainMod SHIFT, Q, plugin:xtd:closeunfocused 
bind = ALT, f4, forcekillactive
bindd = $mainMod SHIFT, M, Exits Hyprland by terminating the user sessions, exec, hyprctl dispatch exit
bind = $mainMod, V, exec, $ipc launcher clipboard
bindd = $mainMod, SPACE, Runs your application launcher, exec, $ipc launcher toggle 
bindd = $mainMod, N, Control center, exec, $ipc controlCenter toggle
bindd = $mainMod, F, Toggles current window fullscreen (maximize), fullscreen, 1
bindd = $mainMod SHIFT, F, Toggles current window fullscreen (true fullscreen), fullscreen, 0
bindd = $mainMod, Y, Pin current window (shows on all workspaces),pin
#bindd = $mainMod, J, Toggles curren window split mode, togglesplit, # dwindle
bindd = $mainMod, J, Swap window with master window, layoutmsg, swapwithmaster # master
bindd = $mainMod, escape, desc, exec, missioncenter # $terminal -e btop
bind = $mainMod, H, exec, hyprctl dispatch setprop active opaque toggle
bind = $mainMod, P, exec, $ipc plugin:screen-toolkit colorPicker
bind = $mainMod, code:47, exec, $ipc launcher emoji
bind = $mainMod CTRL, F, fullscreenstate, 0, 2
bind = ALT, TAB, focuscurrentorlast
bind = ALT, TAB, bringactivetotop
#bind = $mainMod, G, hyprexpo:expo, toggle
bindr = $mainMod, SUPER_L, plugin:hytop:toggle
bind = $mainMod, M, exec, $ipc sessionMenu toggle
bind = $mainMod, B, exec, $ipc battery togglePanel

bind = , ALT_R, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && swayosd-client --input-volume 0
bind = , Control_R, exec, swayosd-client --output-volume mute-toggle || wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ======= Grouping Windows =======
bindd = $mainMod, K, Toggles current window group mode (ungroup all related), togglegroup,
bindd = $mainMod SHIFT, Tab, Switches to the next window in the group, changegroupactive, f

# ======= Volume Control =======
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# ======= Playback Control =======

bindd = , XF86AudioPlay, Toggles play/pause, exec, playerctl play-pause && swayosd-client --playerctl play-pause
bindd = , XF86AudioNext, Next track, exec, playerctl next && swayosd-client --playerctl next
bindd = , XF86AudioPrev, Previous track, exec, playerctl previous && swayosd-client --playerctl previous

# ======= Screen Brightness =======

bindd = $mainMod, L, Lock the screen, exec, $ipc lockScreen lock
bindd = $mainMod, O, Reload/restarts Waybar, exec, pkill waybar ; waybar
bindd = $mainMod SHIFT, O, Reload/restarts Waybar, exec, pkill walker ; walker

# ======= Window Actions =======

## Move window towards a direction
bindd = $mainMod SHIFT, left, Move active window to the left, movewindow, l
bindd = $mainMod SHIFT, right, Move active window to the right, movewindow, r
bindd = $mainMod SHIFT, up, Move active window upwards, movewindow, u
bindd = $mainMod SHIFT, down, Move active window downwards, movewindow, d

## Floating window binds
bindd = $mainMod, TAB, cycle through windows (specifically for switching from floating to tiling focus), cyclenext
bind = $mainMod, TAB, bringactivetotop
bindd = $mainMod CTRL SHIFT, K, bring floating window ontop, bringactivetotop
bindd = $mainMod CTRL, C, Switches current window between floating and tiling mode, togglefloating
bind = $mainMod CTRL, C, centerwindow
bindd = $mainMod SHIFT, C, Centers floating window, centerwindow
bind = $mainMod, c, setfloating
bind = $mainMod, c, resizeactive, exact 80% 80%
bind = $mainMod, c, centerwindow

# Resize window with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:273, resizewindow	#Resize the window towards a direction
bindm = $mainMod, mouse:272, movewindow		#Drag window  
## Resizing Windows End #
## Move active window to a workspace with $mainMod + CTRL + [0-9]
## Same as above, but doesn't switch to the workspace
bindd = $mainMod SHIFT, 1, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod SHIFT, 2, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod SHIFT, 3, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod SHIFT, 4, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod SHIFT, 5, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod SHIFT, 6, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Move window silently to workspace 10, movetoworkspacesilent, 10
# Window actions End #

# ======= Workspace Actions =======

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10
# Special workspaces (scratchpads)
bindd = $mainMod CTRL, minus, Move active window to Special workspace, movetoworkspace,special
bindd = $mainMod, minus, Move to special workspace silently, movetoworkspacesilent,special
bindd = $mainMod, equal, Toggles the Special workspace, togglespecialworkspace, special

bindd = $mainMod, F1, Call special workspace scratchpad, togglespecialworkspace, scratchpad:1
bindd = $mainMod, F2, Call special workspace scratchpad, togglespecialworkspace, scratchpad:2
bindd = $mainMod, F3, Call special workspace scratchpad, togglespecialworkspace, scratchpad:3
bindd = $mainMod, F4, Call special workspace scratchpad, togglespecialworkspace, scratchpad:4
bindd = $mainMod, F5, Call special workspace scratchpad, togglespecialworkspace, scratchpad:5

bind = $mainMod SHIFT, F1, movetoworkspacesilent, scratchpad:1
bind = $mainMod SHIFT, F2, movetoworkspacesilent, scratchpad:2
bind = $mainMod SHIFT, F3, movetoworkspacesilent, scratchpad:3
bind = $mainMod SHIFT, F4, movetoworkspacesilent, scratchpad:4
bind = $mainMod SHIFT, F5, movetoworkspacesilent, scratchpad:5

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

bind = $mainMod CTRL, S, movetoworkspacesilent, +0
bind = $mainMod SHIFT CTRL, S, movetoworkspace, +0

# ======= Additional Settings =======

# https://wiki.hyprland.org/Configuring/Binds
binds {
    allow_workspace_cycles = 1
    workspace_back_and_forth = 1
    workspace_center_on = 1
	movefocus_cycles_fullscreen = true
	window_direction_monitor_fallback = true
}
