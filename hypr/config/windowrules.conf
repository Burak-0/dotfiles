# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/0.45.0/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule = float on, no_anim on, move (0) (0), match:class ^(flameshot)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)
windowrule = float on, match:class ^()$, match:title ^(Picture in picture)$
windowrule = float on, match:class ^()$, match:title ^(Save File)$
windowrule = float on, match:class ^()$, match:title ^(Open File)$
windowrule = float on, match:class ^(LibreWolf)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(thunar)$, match:title ^(Rename.*|File Operation Progress)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
windowrule = float on, match:class ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrule = float on, match:class ^(CachyOSHello)$
windowrule = float on, match:class ^(zenity)$
windowrule = float on, match:class ^()$, match:title ^(Steam - Self Updater)$
windowrule = float on, match:class ^(com.github.hluk.copyq)$
#windowrule = render_unfocused on, match:class .*
#windowrule = render_unfocused on, match:class .*(steam_app_|wine|proton|lutris|heroic).*
#windowrule = render_unfocused on, match:content 3
#windowrule = float on, match:modal "Extract", match:modal "Wine"
# Increase the opacity
windowrule = opacity 1.0 override, match:class $browserClass
windowrule = opacity 0.9 0.9, match:class ^(Rofi)$
#windowrule = opacity 0.97, class:^(thunar|nemo)$
#windowrule = opacity 0.96, class:^(discord|armcord|webcord)$
#windowrule = opacity 0.95, title:^(QQ|Telegram)$
#windowrule = opacity 0.95, title:^(NetEase Cloud Music Gtk4)$
# General window rules
windowrule = stay_focused on, dim_around on, match:class ^(polkit-gnome-authentication-agent-1|com.github.hluk.copyq)$
windowrule = float on, size 600 340, center on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp|.*Discord|(?i).*rename.*|(?i).*save.*|(?i).*open.*|(?i).*setting.*|Better Control)$
windowrule = float on, match:class ^(7zFM)$
windowrule = center on, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp|Discord|(?i).*rename.*|(?i).*save.*|(?i).*open.*|(?i).*setting.*|Better Control)$
windowrule = center on, match:class ^(xdg-desktop-portal-gtk|com.github.hluk.copyq)$
windowrule = size (monitor_w*0.65) (monitor_h*0.65), match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp|(?i).*rename.*|(?i).*save.*|(?i).*open.*|Better Control)$
windowrule = size (monitor_w*0.4) (monitor_h*0.4), match:class ^(com.github.hluk.copyq|xdg-desktop-portal-gtk)$
windowrule = size (monitor_w*0.8) (monitor_h*0.8), match:title ^(.*Discord)$
#windowrule = pin on, match:title ^(danmufloat)$
#windowrule = rounding 5, match:title ^(danmufloat|termfloat)$
#windowrule = animation slide right, class:^(kitty|Alacritty)$
#windowrule = no_blur on, match:class ^(org.mozilla.firefox)$
# Decorations related to floating windows on workspaces 1 to 10
#windowrule = bordersize 1, floating:1, onworkspace:w[fv1-10]
#windowrule = bordercolor $lavender, floating:1, onworkspace:w[fv1-10]
#windowrule = rounding 8, floating:1, onworkspace:w[fv1-10]
#windowrule = size 500 500, floating:1, onworkspace:w[fv1-10]
# Decorations related to tiling windows on workspaces 1 to 10
#windowrule = bordersize 3, floating:0, onworkspace:f[1-10]
#windowrule = rounding 4, floating:0, onworkspace:f[1-10]
#windowrule = border_size 0, match:focus false
# Windows Rules End #

# Smart Gaps
#workspace = w[tv1], gapsout:1, gapsin:0
#workspace = f[1], gapsout:1, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[v1]
#windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
#windowrule = rounding 0, match:float 0, match:workspace f[1]

# Layers Rules #
layerrule = animation slide top, match:namespace logout_dialog
# layerrule = animation popin 50%, waybar
layerrule = animation slide down, blur on, ignore_alpha 0, match:namespace waybar

layerrule = animation fade 50%, match:namespace wallpaper

layerrule = blur on, dim_around on, animation popin 97%, ignore_alpha 0, match:namespace rofi


layerrule = dim_around on, blur on, ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync-notification-window
# Layers Rules End #
