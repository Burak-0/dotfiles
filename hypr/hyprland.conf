$mainMod = SUPER

source = ~/.config/hypr/mocha.conf

#source = ~/.config/hypr/config/environment.conf
source = ~/.config/hypr/config/keybinds.conf
source = ~/.config/hypr/config/gkeybinds.conf
source = ~/.config/hypr/config/monitor.conf
source = ~/.config/hypr/config/windowrules.conf
source = ~/.config/hypr/config/animations.conf
source = ~/.config/hypr/config/startup.conf
source = ~/.config/hypr/config/plugins.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us, tr
    kb_variant = 
    kb_model =
    kb_options = grp:ralt_rshift_toggle
    kb_rules =
    numlock_by_default = true

    follow_mouse = 2
    mouse_refocus = false
    float_switch_override_focus = 0
    #accel_profile=flat 
    #force_no_accel=true

    repeat_delay = 350
    repeat_rate = 30

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 3.5, 5, 5, 5
    border_size = 1
    col.active_border = $blue $mauve 30deg
    col.inactive_border = $base

    layout = master

    gesture = 3, horizontal, workspace

    allow_tearing = true

    resize_on_border = true
    extend_border_grab_area = 20
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    active_opacity=1
    inactive_opacity=0.9
    fullscreen_opacity=1.0
    
    dim_inactive = true
    dim_strength = 0.1

    rounding = 15
    
    blur {
    	    enabled = true
	    size = 10
	    passes = 2
	    new_optimizations = on
	    ignore_opacity = true
	    noise = 0
    	    brightness = 0.90
    }

    shadow {
    	    enabled = true
	    sharp = false
            range = 200
            #offset = 0, 40
            scale = 0.9
	    render_power = 4
	    color = rgba(1a1a1aaf)
    }
}

group {
    auto_group = false
    col.border_active = 0xffb4befe
    col.border_inactive = 0xff313244    

    groupbar {
        rounding = 5
        font_size = 10
    	height = 5
    	indicator_gap = 4
    	indicator_height = 3
        round_only_edges = false
    	col.active = 0xffb4befe
    	col.inactive = 0xff89b4fa
    	keep_upper_gap = true
    }
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

misc {
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    initial_workspace_tracking = 0
}


