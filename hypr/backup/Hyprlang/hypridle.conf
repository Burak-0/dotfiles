general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 445                                # 7min 25sec - just before dimming
    on-timeout = brightnessctl -s                # save current brightness
}

listener {
    timeout = 450                                # 7.5min.
    on-timeout = brightnessctl set 10%         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
listener { 
    timeout = 450                                          # 7.5min.
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
    on-resume = sleep 0.1 && brightnessctl -rd rgb:kbd_backlight || true        # turn on keyboard backlight.
}

listener {
    timeout = 600                                 # 10min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 660                                   # 11min
    on-timeout = hyprctl dispatch dpms off          # lock screen when timeout has passed
    on-resume = hyprctl dispatch dpms on && sleep 0.2 && brightnessctl -r
}
